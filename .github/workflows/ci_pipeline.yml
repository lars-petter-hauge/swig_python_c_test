name: CI

on: [pull_request]

jobs:
  tests:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [3.8] #["3.6", "3.8"]
        os: [ ubuntu-latest ]
        #include:
        #  - python-version: 3.6
        #    os: macos-latest
        type: ["native"] #, "swig", "swig_skbuild"]

    steps:
      - uses: "actions/checkout@v2"
        with:
          fetch-depth: 0

      - uses: "actions/setup-python@v2"
        with:
          python-version: "${{ matrix.python-version }}"

      - name: "install dependencies"
        run: pip install pytest

      - name: "Install native"
        if: matrix.type == 'native'
        run: >
          pushd example_native &&
          ./build.sh &&
          echo $PWD > PYTHON_PATH &&
          popd
        
      - name: "Install with swig"
        if: matrix.type == 'swig'
        run: >
          pushd example_swig &&
          ./build.sh &&
          echo $PWD > PYTHON_PATH &&
          popd
      
      - name: "Install with swig and skbuild"
        if: matrix.type == 'swig_skbuild'
        run: >
          pushd example_swig_skbuild &&
          ./build.sh &&
          echo $PWD > PYTHON_PATH &&
          popd &&

      - name: "Run tests"
        run: >
          export PYTHONPATH=$(cat PYTHON_PATH)
          pytest tests
